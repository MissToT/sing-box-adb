name: Convert AdGuard Rules to sing-box

on:
  schedule:
    # 每天北京时间 06:00 自动运行（UTC 22:00）
    - cron: '0 22 * * *'
  workflow_dispatch: # 支持手动触发
  push:
    branches:
      - main

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download rules from 10007
        run: |
          echo "⬇️ 正在下载 10007 规则..."
          curl -fsSL "https://raw.githubusercontent.com/lingeringsound/10007/main/adb.txt" -o adb.txt
          echo "✅ adb.txt 下载完成，行数：$(wc -l < adb.txt)"
          curl -fsSL "https://raw.githubusercontent.com/lingeringsound/10007/main/all" -o all.txt
          echo "✅ all.txt 下载完成，行数：$(wc -l < all.txt)"
          curl -fsSL "https://raw.githubusercontent.com/lingeringsound/10007/main/reward" -o reward.txt
          echo "✅ reward.txt 下载完成，行数：$(wc -l < reward.txt)"

      - name: Download rules from anti-AD
        run: |
          echo "⬇️ 正在下载 anti-AD 规则..."
          curl -fsSL "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-adguard.txt" -o anti-ad-adguard.txt
          echo "✅ anti-ad-adguard.txt 下载完成，行数：$(wc -l < anti-ad-adguard.txt)"
          curl -fsSL "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-easylist.txt" -o anti-ad-easylist.txt
          echo "✅ anti-ad-easylist.txt 下载完成，行数：$(wc -l < anti-ad-easylist.txt)"

      - name: Install sing-box
        run: |
          echo "📦 正在安装 sing-box..."
          LATEST=$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          echo "最新版本：$LATEST"
          curl -fsSL "https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-${LATEST}-linux-amd64.tar.gz" \
            -o sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv "sing-box-${LATEST}-linux-amd64/sing-box" /usr/local/bin/sing-box
          sing-box version
          echo "✅ sing-box 安装完成"

      - name: Convert to sing-box rule-set (.srs binary)
        run: |
          echo "🔄 正在转换规则集..."
          sing-box rule-set convert --type adguard --output adb.srs adb.txt
          echo "✅ adb.srs 生成完成（$(du -sh adb.srs | cut -f1)）"
          sing-box rule-set convert --type adguard --output all.srs all.txt
          echo "✅ all.srs 生成完成（$(du -sh all.srs | cut -f1)）"
          sing-box rule-set convert --type adguard --output reward.srs reward.txt
          echo "✅ reward.srs 生成完成（$(du -sh reward.srs | cut -f1)）"
          sing-box rule-set convert --type adguard --output anti-ad-adguard.srs anti-ad-adguard.txt
          echo "✅ anti-ad-adguard.srs 生成完成（$(du -sh anti-ad-adguard.srs | cut -f1)）"
          sing-box rule-set convert --type adguard --output anti-ad-easylist.srs anti-ad-easylist.txt
          echo "✅ anti-ad-easylist.srs 生成完成（$(du -sh anti-ad-easylist.srs | cut -f1)）"

      - name: Generate metadata
        run: |
          echo "📝 生成元数据..."
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          cat > metadata.json <<METAEOF
          {
            "updated_at": "${TIMESTAMP}",
            "files": {
              "adb": { "source_lines": $(wc -l < adb.txt), "srs_size": "$(du -sh adb.srs | cut -f1)" },
              "all": { "source_lines": $(wc -l < all.txt), "srs_size": "$(du -sh all.srs | cut -f1)" },
              "reward": { "source_lines": $(wc -l < reward.txt), "srs_size": "$(du -sh reward.srs | cut -f1)" },
              "anti-ad-adguard": { "source_lines": $(wc -l < anti-ad-adguard.txt), "srs_size": "$(du -sh anti-ad-adguard.srs | cut -f1)" },
              "anti-ad-easylist": { "source_lines": $(wc -l < anti-ad-easylist.txt), "srs_size": "$(du -sh anti-ad-easylist.srs | cut -f1)" }
            }
          }
          METAEOF
          echo "📊 转换统计："
          cat metadata.json

      - name: Commit and push updated rules
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add adb.srs adb.txt all.srs all.txt reward.srs reward.txt \
                  anti-ad-adguard.srs anti-ad-adguard.txt \
                  anti-ad-easylist.srs anti-ad-easylist.txt \
                  metadata.json

          if git diff --cached --quiet; then
            echo "📭 规则无变化，跳过提交"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            git commit -m "chore: 自动更新广告规则 [${TIMESTAMP}]"
            git push
            echo "🚀 规则已推送到仓库"
          fi
